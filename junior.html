<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Junior - Ready Buddy</title>
    <!-- Shared navbar styles (reused on all pages) -->
    <link rel="stylesheet" href="shared.css"/>
    <!-- Page theme (only colors/variables) -->
    <link rel="stylesheet" href="junior.css"/>
    <link href="https://fonts.googleapis.com/css?family=Space+Mono:700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* Chatbot integration styles */
        .chatbot-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 800px;
            margin: 2rem auto;
            border: 3px solid #ff4444;
        }
        
        .chatbot-header {
            background: linear-gradient(135deg, #ff4444, #ff6666);
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .chatbot-content {
            height: 600px;
            position: relative;
            background: #f8f9fa;
        }
        
        .chatbot-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            text-align: center;
            font-size: 1.1rem;
        }
        
        /* Page Embed iframe styling */
        .chatbot-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .chatbot-container {
                margin: 1rem;
                border-radius: 10px;
            }
            
            .chatbot-content {
                height: 500px;
            }
        }
        
        /* Demo chatbot simulation */
        .demo-chat {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 1rem;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .message.bot {
            background: #e3f2fd;
            color: #1976d2;
            align-self: flex-start;
        }
        
        .message.user {
            background: #ff4444;
            color: white;
            align-self: flex-end;
        }
        
        .chat-input {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid #eee;
        }
        
        .chat-input input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 0.9rem;
        }
        
        .chat-input input:focus {
            border-color: #ff4444;
        }
        
        .chat-input button {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-input button:hover {
            background: #e03e3e;
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <nav class="nav-menu-left" aria-label="Section links">
            <a href="junior.html" class="nav-link nav-junior">Junior</a>
            <a href="teen.html" class="nav-link nav-teen">Teen</a>
            <a href="parents.html" class="nav-link nav-parents">Parents</a>
        </nav>
        <div class="header" aria-label="Brand">
            <span class="ready">READY</span>
            <i class="fa-solid fa-xmark cross-emoji" aria-hidden="true"></i>
            <span class="buddy">BUDDY</span>
        </div>
        <nav class="nav-menu-right" aria-label="Utility links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link">Contact Us</a>
        </nav>
    </header>

    <main class="page-section">
        <p class="page-subtitle">Learn, play, and explore together</p>
        <h1 class="page-title">
            <span class="page-title-line1">JUNIOR</span>
            <span class="page-title-line2">SQUAD</span>
        </h1>

        <section class="chatbot-container" aria-label="Chatbot">
            <div class="chatbot-header">
                Scout Junior Squad Assistant
            </div>
            <div class="chatbot-content">
                <!-- Option 1: Replace this with your actual chatbot embed code -->
                <!-- <iframe class="chatbot-iframe" src="YOUR_CHATBOT_URL_HERE"></iframe> -->
                
                <!-- Option 2: Or replace with a script tag if your chatbot provides JavaScript embed -->
                <!-- <div id="chatbot-widget"></div>
                <script>
                    // Your chatbot initialization code here
                </script> -->
                
                <!-- Demo chatbot (remove this when adding real chatbot) -->
                <div class="demo-chat">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message bot">
                            Hi there! I'm Ready Buddy, your learning assistant. How can I help you today? 🤖
                        </div>
                    </div>
                    <div class="chat-input">
                        <input type="text" placeholder="Type your message..." id="messageInput">
                        <button onclick="sendMessage()">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- JotForm Handler Script -->
    <script src='https://cdn.jotfor.ms/s/umd/latest/for-form-embed-handler.js' onload="initJotForm()" onerror="console.error('JotForm script failed to load')"></script>
    <script>
        function initJotForm() {
            // Wait a bit to ensure the handler is fully loaded
            setTimeout(function() {
                if (typeof window.jotformEmbedHandler === 'function') {
                    window.jotformEmbedHandler("iframe[id='JotFormIFrame-0199110ff9567d858dccbe9cad2924d12bd2']",
                        "https://eu.jotform.com");
                } else {
                    console.error('JotForm embed handler not available');
                }
            }, 100);
        }
        
        // Fallback: try to initialize after DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof window.jotformEmbedHandler === 'function') {
                window.jotformEmbedHandler("iframe[id='JotFormIFrame-0199110ff9567d858dccbe9cad2924d12bd2']",
                    "https://eu.jotform.com");
            }
        });
    </script>
</body>
</html>
